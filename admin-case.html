<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法律案例管理 - 法律咨询平台管理端</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .top-header {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-header .logo {
            font-size: 18px;
            font-weight: bold;
        }
        .top-header .user-actions {
            display: flex;
            gap: 10px;
        }
        .top-header a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 3px;
        }
        .top-header a:hover {
            background-color: #555;
        }
        .container {
            display: flex;
            height: calc(100vh - 50px);
        }
        .sidebar {
            width: 200px;
            background-color: #f0f0f0;
            padding: 20px;
            border-right: 1px solid #ddd;
        }
        .sidebar h2 {
            margin-top: 0;
            color: #333;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin: 10px 0;
        }
        .sidebar a {
            color: #333;
            text-decoration: none;
            display: block;
            padding: 8px 0;
        }
        .sidebar a:hover {
            color: #007bff;
        }
        .main-content {
            flex: 1;
            padding: 20px;
        }
        .page-header {
            background-color: white;
            padding: 15px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .page-header h1 {
            margin: 0;
            font-size: 20px;
        }
        .content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .btn {
            padding: 5px 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-right: 5px;
        }
        .btn-danger {
            background-color: #dc3545;
        }
        .btn-success {
            background-color: #28a745;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        .search-box {
            margin-bottom: 20px;
        }
        .search-box input {
            padding: 5px;
            width: 200px;
        }
        .action-buttons {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="top-header">
        <div class="logo">法律咨询平台管理端</div>
        <div class="user-actions">
            <a href="#">修改密码</a>
            <a href="login.html">退出登录</a>
        </div>
    </div>
    <div class="container">
        <div class="sidebar">
            <h2>管理菜单</h2>
            <ul>
                <li><a href="admin-user.html">用户管理</a></li>
                <li><a href="admin-law-type.html">法律类型管理</a></li>
                <li><a href="admin-case.html">法律案例管理</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="page-header">
                <h1>法律案例管理</h1>
            </div>
            <div class="content">
                <div class="action-buttons">
                    <a href="#" class="btn">添加法律案例</a>
                    <a href="#" class="btn">批量上架</a>
                    <a href="#" class="btn">批量下架</a>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="搜索法律案例...">
                    <select style="padding: 5px; margin: 0 5px;">
                        <option value="">全部法律类型</option>
                        <option value="民事">民事</option>
                        <option value="刑事">刑事</option>
                        <option value="行政">行政</option>
                        <option value="劳动">劳动</option>
                        <option value="侵权">侵权</option>
                    </select>
                    <input type="text" placeholder="按标签搜索..." style="width: 150px; padding: 5px; margin: 0 5px;">
                    <button class="btn">搜索</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="select-all-case"></th>
                            <th>ID</th>
                            <th>封面</th>
                            <th>标题</th>
                            <th>类型</th>
                            <th>标签</th>
                            <th>发布时间</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" class="case-checkbox"></td>
                            <td>1</td>
                            <td><img src="https://via.placeholder.com/60x40" alt="封面"></td>
                            <td>离婚财产分割案例</td>
                            <td>民事</td>
                            <td>财产分割,离婚</td>
                            <td>2026-03-01</td>
                            <td>发布</td>
                            <td>
                                <a href="#" class="btn">编辑</a>
                                <a href="#" class="btn btn-danger">删除</a>
                                <a href="#" class="btn">下架</a>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" class="case-checkbox"></td>
                            <td>2</td>
                            <td><img src="https://via.placeholder.com/60x40" alt="封面"></td>
                            <td>劳动合同纠纷案例</td>
                            <td>劳动</td>
                            <td>劳动合同,纠纷</td>
                            <td>2026-03-02</td>
                            <td>发布</td>
                            <td>
                                <a href="#" class="btn">编辑</a>
                                <a href="#" class="btn btn-danger">删除</a>
                                <a href="#" class="btn">下架</a>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" class="case-checkbox"></td>
                            <td>3</td>
                            <td><img src="https://via.placeholder.com/60x40" alt="封面"></td>
                            <td>交通事故赔偿案例</td>
                            <td>侵权</td>
                            <td>交通事故,赔偿</td>
                            <td>2026-03-03</td>
                            <td>下架</td>
                            <td>
                                <a href="#" class="btn">编辑</a>
                                <a href="#" class="btn btn-danger">删除</a>
                                <a href="#" class="btn btn-success">发布</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
